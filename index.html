<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Memory Box</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Moments I Treasure</h1>
        <p>A simple place for my personal memories.</p>
    </header>

    <main class="container">
        <div class="gallery">
            <!-- Add a block like this for every photo you have -->
            <div class="memory-card">
                <img src="images/pic1.jpg" alt="Memory 1">
                <p class="caption">A special day to remember.</p>
            </div>

            <div class="memory-card">
                <img src="images/pic2.jpg" alt="Memory 2">
                <p class="caption">Good times with good people.</p>
            </div>
            
            <!-- You can add more cards here -->
        </div>
    </main>

</body>
</html>
